<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnonPlayer - Private Video Sharing</title>
    <style>
        :root {
            --bg-color: #050505;
            --player-bg: #000000;
            --accent: #00ffcc;
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Branding */
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            text-align: center;
            margin-bottom: 20px;
            text-decoration: none;
            display: block;
        }

        /* Video Player Area */
        .video-wrapper {
            background: var(--player-bg);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .video-wrapper iframe, 
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Ad Sections */
        .ad-container {
            width: 100%;
            margin: 20px 0;
            text-align: center;
            min-height: 90px;
            background: rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        /* Empty State */
        .no-video {
            text-align: center;
            padding: 40px;
            background: #111;
            border-radius: 8px;
        }

        .input-box {
            margin-top: 20px;
            display: flex;
            gap: 5px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
        }

        button {
            padding: 10px 20px;
            background: var(--accent);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            margin-top: 30px;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <a href="/" class="logo">Goo-Shu</a>

        <div class="ad-container">
            <div id="ad-top">
                <small style="color:#333">Advertisement</small>
            </div>
        </div>

        <div id="player-area">
            <div class="no-video" id="status-msg">Memuat video...</div>
        </div>

        <div class="ad-container">
            <div id="ad-bottom">
                <small style="color:#333">Advertisement</small>
            </div>
        </div>

        <div id="generator" style="display:none;">
            <p style="text-align:center">Masukkan link video untuk generate link share:</p>
            <div class="input-box">
                <input type="text" id="rawUrl" placeholder="Contoh: https://cdn.videy.co/xyz.mp4">
                <button onclick="generateLink()">Buat Link Share</button>
            </div>
            <p id="resultLink" style="word-break: break-all; color: var(--accent); margin-top: 10px; font-size: 0.9rem;"></p>
        </div>
    </div>

    <footer>&copy; 2024-2026 goo-Shu.</footer>

    <script>
        // Fungsi mengambil parameter "v" dari URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const videoUrl = getQueryParam('v');
        const playerArea = document.getElementById('player-area');
        const generator = document.getElementById('generator');

        if (videoUrl) {
            let embedHtml = '';
            
            // Logika deteksi sumber
            if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be')) {
                let id = videoUrl.includes('v=') ? videoUrl.split('v=')[1].split('&')[0] : videoUrl.split('/').pop();
                embedHtml = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
            } else {
                // Default sebagai video MP4 langsung (Videy atau direct link)
                embedHtml = `<video controls autoplay><source src="${videoUrl}" type="video/mp4">Browser anda tidak mendukung video.</video>`;
            }

            playerArea.innerHTML = `<div class="video-wrapper">${embedHtml}</div>`;
        } else {
            // Jika tidak ada parameter v=, tampilkan form buat link
            document.getElementById('status-msg').style.display = 'none';
            generator.style.display = 'block';
        }

        function generateLink() {
            const raw = document.getElementById('rawUrl').value.trim();
            if (raw) {
                const currentBase = window.location.href.split('?')[0];
                const shareLink = `${currentBase}?v=${encodeURIComponent(raw)}`;
                document.getElementById('resultLink').innerText = "Link Share: " + shareLink;
            }
        }
    </script>
</body>
</html>
